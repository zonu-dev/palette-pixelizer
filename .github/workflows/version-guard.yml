name: Version Guard

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check:version-bump
        env:
          VERSION_GUARD_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          VERSION_GUARD_HEAD: ${{ github.sha }}
